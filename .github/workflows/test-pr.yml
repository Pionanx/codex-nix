name: Test PR

on:
  pull_request:
    paths:
      - "sources.json"
      - "package.nix"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: test-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-build:
    name: ${{ matrix.system }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-15-intel
            system: x86_64-darwin
          - os: macos-15
            system: aarch64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Verify latest stable release
        if: matrix.system == 'x86_64-linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update.sh --check

      - name: Build and run flake checks
        run: nix flake check --print-build-logs

      - name: Verify packaged version
        run: |
          EXPECTED_VERSION=$(jq --raw-output '.version' sources.json)
          ACTUAL_VERSION=$(nix run .# -- --version)
          test "$ACTUAL_VERSION" = "codex-cli $EXPECTED_VERSION"
