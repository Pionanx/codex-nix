name: Update Codex

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-codex
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      base_sha: ${{ steps.prepare.outputs.base_sha }}
      publish_needed: ${{ steps.prepare.outputs.publish_needed }}
      version: ${{ steps.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Prepare latest stable release
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          ./scripts/update.sh
          VERSION=$(jq --raw-output '.version' sources.json)

          PUBLISH_NEEDED=false
          if ! git diff --quiet -- sources.json; then
            PUBLISH_NEEDED=true
          fi

          if ! git ls-remote --exit-code --tags \
            origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            PUBLISH_NEEDED=true
          fi

          LATEST_TAG_SHA=$(
            git ls-remote origin "refs/tags/latest^{}" | awk '{print $1}'
          )
          if [ -z "$LATEST_TAG_SHA" ]; then
            LATEST_TAG_SHA=$(
              git ls-remote origin "refs/tags/latest" | awk '{print $1}'
            )
          fi
          if [ "$LATEST_TAG_SHA" != "$BASE_SHA" ]; then
            PUBLISH_NEEDED=true
          fi

          {
            echo "base_sha=$BASE_SHA"
            echo "publish_needed=$PUBLISH_NEEDED"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release sources
        if: steps.prepare.outputs.publish_needed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: codex-sources
          path: sources.json
          if-no-files-found: error

  test:
    if: needs.prepare.outputs.publish_needed == 'true'
    needs: prepare
    name: ${{ matrix.system }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-15-intel
            system: x86_64-darwin
          - os: macos-15
            system: aarch64-darwin

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}

      - uses: actions/download-artifact@v8
        with:
          name: codex-sources
          path: .

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Build and run flake checks
        run: nix flake check --print-build-logs

      - name: Verify packaged version
        run: |
          EXPECTED_VERSION=$(jq --raw-output '.version' sources.json)
          ACTUAL_VERSION=$(nix run .# -- --version)
          test "$ACTUAL_VERSION" = "codex-cli $EXPECTED_VERSION"

  publish:
    if: needs.prepare.outputs.publish_needed == 'true'
    needs: [prepare, test]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: codex-sources
          path: .

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Recheck latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update.sh --check

      - name: Commit and publish atomically
        env:
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git fetch --tags origin \
            "+refs/heads/main:refs/remotes/origin/main"
          test "$(git rev-parse origin/main)" = "$BASE_SHA"

          CHANGED_FILES=$(git diff --name-only)
          if [ -n "$CHANGED_FILES" ] && [ "$CHANGED_FILES" != "sources.json" ]; then
            echo "Unexpected changed files:" >&2
            echo "$CHANGED_FILES" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- sources.json; then
            git add sources.json
            git commit -m "update codex to ${VERSION}"
          fi

          if git show-ref --verify --quiet "refs/tags/v${VERSION}"; then
            git diff --exit-code "v${VERSION}" -- sources.json
          else
            git tag -a "v${VERSION}" -m "codex v${VERSION}"
          fi

          git tag --force --annotate latest \
            --message "Latest: v${VERSION}"

          git push --atomic origin \
            "HEAD:refs/heads/main" \
            "refs/tags/v${VERSION}" \
            "+refs/tags/latest"
